version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosec
    - gocritic
    - godot
    - revive
  settings:
    godot:
      scope: toplevel
      capital: true
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: increment-decrement
        - name: var-naming
        - name: range
        - name: receiver-naming
        - name: indent-error-flow
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
  exclusions:
    presets:
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - gosec
      - text: "avoid package names that conflict"
        linters:
          - revive
    generated: lax
