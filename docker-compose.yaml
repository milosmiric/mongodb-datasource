services:
  cert-gen:
    image: alpine/openssl
    volumes:
      - ./docker/tls/generate-certs.sh:/generate-certs.sh:ro
      - ./docker/tls/certs:/certs
    entrypoint: ["sh", "/generate-certs.sh"]
    restart: "no"

  grafana:
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./dist:/var/lib/grafana/plugins/milosmiric-mongodb-datasource
      - ./provisioning:/etc/grafana/provisioning
      - ./docker/tls/certs:/certs:ro
    depends_on:
      mongodb:
        condition: service_healthy

  mongodb:
    image: mongo:8
    ports:
      - "27105:27017"
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--tlsMode", "preferTLS", "--tlsCertificateKeyFile", "/certs/server-bundle.pem", "--tlsCAFile", "/certs/ca.pem", "--tlsAllowConnectionsWithoutCertificates"]
    depends_on:
      cert-gen:
        condition: service_completed_successfully
    healthcheck:
      test: |
        mongosh --tls --tlsAllowInvalidCertificates --eval "
          try {
            rs.status().ok
          } catch(e) {
            rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'mongodb:27017'}]});
            sleep(2000);
            rs.status().ok
          }
        " --quiet
      interval: 5s
      timeout: 10s
      retries: 10
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongo-seed:/seed
      - ./docker/tls/certs:/certs:ro

  mongo-seed:
    image: mongo:8
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./docker/mongo-seed:/seed
      - ./docker/tls/certs:/certs:ro
    entrypoint: ["mongosh", "--host", "mongodb:27017", "--tls", "--tlsCAFile", "/certs/ca.pem", "--file", "/seed/seed.js"]
    restart: "no"

volumes:
  mongodb_data:
