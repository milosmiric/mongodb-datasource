apiVersion: 1

datasources:
  - name: MongoDB
    type: milosmiric-mongodb-datasource
    access: proxy
    isDefault: true
    uid: mongodb-demo
    editable: true
    secureJsonData:
      uri: "mongodb://mongodb:27017/?replicaSet=rs0&directConnection=true"
    jsonData:
      database: "demo"
    version: 1
